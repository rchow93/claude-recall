version: '3.8'

# Tiered Memory Infrastructure
# Run: docker compose -f docker-compose.tiered.yml up -d

services:
  # PostgreSQL with pgvector for cold tier storage
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claude-recall-postgres
    environment:
      POSTGRES_DB: claude_recall
      POSTGRES_USER: claude_recall
      POSTGRES_PASSWORD: claude_recall
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude_recall -d claude_recall"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Stack with RediSearch for hot tier storage
  redis:
    image: redis/redis-stack:latest
    container_name: claude-recall-redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight web UI
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: claude-recall-postgres-data
  redis_data:
    name: claude-recall-redis-data

# Usage:
#   Start:   docker compose -f docker-compose.tiered.yml up -d
#   Stop:    docker compose -f docker-compose.tiered.yml down
#   Logs:    docker compose -f docker-compose.tiered.yml logs -f
#   Reset:   docker compose -f docker-compose.tiered.yml down -v
#
# Access:
#   PostgreSQL: postgres://claude_recall:claude_recall@localhost:5432/claude_recall
#   Redis:      redis://localhost:6379
#   RedisInsight: http://localhost:8001
#
# Note: Ollama must be installed and running separately:
#   ollama pull nomic-embed-text
