version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claude-recall-postgres
    restart: unless-stopped  # Auto-restart on boot
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: claude_recall
    ports:
      - "5434:5432"  # Use 5434 to avoid conflict
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    container_name: claude-recall-redis
    restart: unless-stopped  # Auto-restart on boot
    ports:
      - "6380:6379"  # Use 6380 to avoid conflict
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: Run the Python service in a container
  claude-recall:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-recall-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/claude_recall
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_HOST: http://host.docker.internal:11434
      CLAUDE_RECALL_SERVER_HOST: 0.0.0.0
      CLAUDE_RECALL_SERVER_PORT: 37778
    ports:
      - "37778:37778"
    profiles:
      - full  # Only start with --profile full

volumes:
  postgres_data:
  redis_data:
